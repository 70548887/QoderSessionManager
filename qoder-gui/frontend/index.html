<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Qoder 会话管理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            background: #1e1e1e;
            color: #cccccc;
            overflow: hidden;
            user-select: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            min-width: 260px;
            background: #252526;
            border-right: 1px solid #3c3c3c;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid #3c3c3c;
        }

        .sidebar-header h1 {
            font-size: 13px;
            color: #007acc;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .user-info {
            padding: 8px 16px;
            font-size: 11px;
            color: #858585;
            border-bottom: 1px solid #3c3c3c;
        }

        .workspace-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .workspace-list::-webkit-scrollbar {
            width: 8px;
        }

        .workspace-list::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .workspace-list::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 4px;
        }

        .workspace-item {
            padding: 8px 10px;
            margin-bottom: 2px;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .workspace-item:hover {
            background: #2a2d2e;
        }

        .workspace-item.active {
            background: #37373d;
        }

        .workspace-item .name {
            font-size: 12px;
            font-weight: 400;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .workspace-item .count {
            font-size: 10px;
            color: #858585;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .toolbar {
            padding: 8px 12px;
            background: #2d2d2d;
            border-bottom: 1px solid #3c3c3c;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 5px 12px;
            background: #3c3c3c;
            border: 1px solid #3c3c3c;
            border-radius: 3px;
            color: #cccccc;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn:hover {
            background: #4a4a4a;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: #0e639c;
            border-color: #0e639c;
            color: white;
        }

        .btn-primary:hover {
            background: #1177bb;
        }

        .btn-danger {
            background: #c42b1c;
            border-color: #c42b1c;
        }

        .btn-danger:hover {
            background: #d63a2b;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .content::-webkit-scrollbar {
            width: 8px;
        }

        .content::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .content::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 4px;
        }

        .section-title {
            font-size: 12px;
            color: #858585;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chat-list, .backup-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-item, .backup-item {
            background: #2d2d30;
            border-radius: 4px;
            padding: 10px 12px;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: #37373d;
        }

        .backup-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .backup-item .info {
            flex: 1;
            min-width: 0;
        }

        .backup-item .name {
            font-size: 12px;
            margin-bottom: 2px;
            word-break: break-all;
        }

        .backup-item .meta {
            font-size: 10px;
            color: #858585;
        }

        .backup-item .actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .chat-item .title {
            font-size: 13px;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .chat-item .meta {
            font-size: 10px;
            color: #858585;
            display: flex;
            gap: 10px;
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
        }

        .welcome h2 {
            font-size: 16px;
            margin-bottom: 6px;
            color: #cccccc;
        }

        .welcome p {
            color: #858585;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .welcome-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
        }

        .welcome-card {
            background: #2d2d30;
            padding: 16px 12px;
            border-radius: 6px;
            text-align: center;
        }

        .welcome-card .icon {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .welcome-card h3 {
            font-size: 11px;
            margin-bottom: 2px;
            color: #cccccc;
        }

        .welcome-card p {
            font-size: 10px;
            margin: 0;
            color: #858585;
        }

        .status-bar {
            padding: 4px 12px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .status-bar.success {
            background: #1f4a1f;
            color: #4ec9b0;
            border-top: 1px solid #3c3c3c;
        }

        .status-bar.error {
            background: #3a1d1d;
            color: #f14c4c;
            border-top: 1px solid #3c3c3c;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 120px;
            color: #858585;
            font-size: 12px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #3c3c3c;
            border-top-color: #007acc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #858585;
        }

        .empty-icon {
            font-size: 36px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .empty p {
            font-size: 12px;
            margin: 4px 0;
        }

        .empty p.small {
            font-size: 10px;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script src="./src/main.js" type="module"></script>
</body>
</html>
